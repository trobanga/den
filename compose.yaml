services:
  clauntainer:
    build:
      context: .
      args:
        CLAUDE_CODE_VERSION: ${CLAUDE_CODE_VERSION:-latest}
        TZ: ${TZ:-UTC}
    image: clauntainer:latest
    container_name: ${CONTAINER_NAME:-clauntainer}
    hostname: ${CONTAINER_NAME:-clauntainer}
    ports:
      - "${SSH_PORT:-2222}:22"
    environment:
      # Repository to clone
      - REPO_URL=${REPO_URL:-}
      # Directory to clone into (default: /workspace/repo)
      - REPO_DIR=${REPO_DIR:-/workspace/repo}
      # Whether to initialize firewall (default: false)
      - INIT_FIREWALL=${INIT_FIREWALL:-false}
      # Whether to auto-start Claude Code (default: true)
      - START_CLAUDE=${START_CLAUDE:-true}
      # Whether to use --dangerously-skip-permissions (default: false)
      - SKIP_PERMISSIONS=${SKIP_PERMISSIONS:-false}
    volumes:
      # Mount SSH public key to temp location for copying
      - ${SSH_PUBLIC_KEY:-~/.ssh/id_ed25519_clauntainer.pub}:/tmp/host_ssh_key.pub:ro
      # Mount Claude config directory to temp location for copying
      - ${CLAUDE_CONFIG:-~/.claude}:/tmp/host_claude:ro
      # Mount Claude settings file to temp location for copying
      - ${CLAUDE_JSON:-~/.claude.json}:/tmp/host_claude.json:ro
      # Mount git config
      - ${GIT_CONFIG:-~/.gitconfig}:/home/node/.gitconfig:ro
      # Mount GPG directory for commit signing
      - ${GNUPG_DIR:-~/.gnupg}:/home/node/.gnupg:ro
      # Workspace: use named volume by default, or mount host dir if WORKSPACE_DIR is set
      - ${WORKSPACE_DIR:-workspace}:/workspace
      # Persist command history
      - command-history:/commandhistory
    cap_add:
      # Required for iptables/firewall management
      - NET_ADMIN
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  command-history:
  workspace:  # Named volume for container-internal workspace (default)
