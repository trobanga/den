# Enable mouse support for scrolling and pane selection
set -g mouse on

# Increase scrollback buffer size
set -g history-limit 10000

# Fix colors and box/line drawing. tmux-256color (from ncurses-term) is the
# recommended terminfo for tmux and supports more capabilities than the older
# screen-256color, which drops some line-drawing output.
set -g default-terminal "tmux-256color"

# Fix mouse scrolling to scroll the tmux buffer instead of sending arrow keys
# Bind mouse wheel up to scroll up in copy mode
bind-key -T copy-mode-vi WheelUpPane send-keys -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -X scroll-down

# Automatically enter copy mode when scrolling up
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"
